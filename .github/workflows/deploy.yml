name: Deploy Application

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.15.1'
          cache: 'npm'

      # 3️⃣ Install dependencies (bypass postinstall)
      - name: Install dependencies (prorevv-frontend)
        run: |
          cd prorevv-frontend
          npm ci --ignore-scripts
          npm install --save-dev @types/node
          echo "Dependencies installed without postinstall scripts"
        env:
          NPM_CONFIG_IGNORE_SCRIPTS: true

      # 4️⃣ Build application
      - name: Build application (prorevv-frontend)
        run: |
          cd prorevv-frontend
          npx next build
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max_old_space_size=4096
          SKIP_TYPE_CHECK: true

      # 5️⃣ Prepare deployment files
      - name: Prepare deployment files
        run: |
          cd prorevv-frontend
          rm -rf .git .next/cache node_modules
          echo "Deployment files ready"

      # 6️⃣ Fix remote permissions
      - name: Fix remote permissions
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            sudo chown -R ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} /home/ec2-user/prorevv-frontend/
            sudo chmod -R 755 /home/ec2-user/prorevv-frontend/

      # 7️⃣ Deploy via Rsync
      - name: Deploy prorevv-frontend
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: ./prorevv-frontend
          TARGET: /home/ec2-user/prorevv-frontend/
          ARGS: "-rlgoDzvc --chmod=Du=rwx,Dg=rx,Do=rx,Fu=rw,Fg=r,Fo=r --no-perms --no-owner --no-group --exclude=.next/cache --exclude=node_modules --exclude=.git --exclude=src"

      # 8️⃣ Skip server dependencies (already built)
      - name: Skip server dependencies
        run: |
          echo "Skipping server dependencies installation - already built on GitHub Actions"

      # 9️⃣ Restart application via PM2
      - name: Restart prorevv-frontend via PM2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ec2-user/prorevv-frontend/
            pm2 reload prorevv-frontend || pm2 start "npm run start" --name prorevv-frontend
            pm2 save
