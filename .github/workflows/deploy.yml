name: CI/CD Pipeline

on:
  push:
    branches:
      - main   
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Project
        run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            sudo yum install git -y
            
            # Setup deployment directory
            DEPLOY_DIR=~/prorevv-frontend
            
            # Use authenticated HTTPS URL with token
            REPO_URL="https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git"
            
            # Check if valid git repository exists
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "Setting up fresh repository..."
              rm -rf $DEPLOY_DIR
              git clone $REPO_URL $DEPLOY_DIR
            else
              # Ensure remote is configured correctly
              cd $DEPLOY_DIR
              git remote set-url origin $REPO_URL || git remote add origin $REPO_URL
              
              # Fetch and reset
              git fetch origin || {
                echo "Fetch failed, re-cloning repository..."
                cd ~
                rm -rf $DEPLOY_DIR
                git clone $REPO_URL $DEPLOY_DIR
              }
            fi
            
            # Navigate and pull latest
            cd $DEPLOY_DIR
            git reset --hard origin/main
            
            # Clean build
            rm -rf node_modules .next
            npm ci --legacy-peer-deps
            npm run build
            
            # Restart app
            pm2 restart prorevv-frontend || pm2 start npm --name "prorevv-frontend" -- start
            echo "Deployment successful!"
