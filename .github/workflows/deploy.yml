name: Deploy Application

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Debug - Check repository structure
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Directory contents ==="
          ls -la
          echo "=== Looking for prorevv-frontend ==="
          find . -name "*prorevv*" -type d
          echo "=== Package.json files ==="
          find . -name "package.json" -type f

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.15.1'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd prorevv-frontend
          npm ci --ignore-scripts
          npm install --save-dev @types/node
          echo "Dependencies installed"

      - name: Build application
        run: |
          cd prorevv-frontend
          npx next build
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max_old_space_size=4096
          SKIP_TYPE_CHECK: true

      - name: Prepare deployment files
        run: |
          cd prorevv-frontend
          rm -rf .git .next/cache node_modules
          echo "Deployment files ready"

      - name: Fix remote permissions
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            sudo chown -R ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} /home/ec2-user/prorevv-frontend/
            sudo chmod -R 755 /home/ec2-user/prorevv-frontend/

      - name: Deploy via Rsync
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: prorevv-frontend
          TARGET: /home/ec2-user/prorevv-frontend/
          ARGS: "-rlgoDzvc --chmod=Du=rwx,Dg=rx,Do=rx,Fu=rw,Fg=r,Fo=r --no-perms --no-owner --no-group --exclude=.next/cache --exclude=node_modules --exclude=.git --exclude=src"

      - name: Restart prorevv-frontend via PM2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ec2-user/prorevv-frontend/
            pm2 reload prorevv-frontend || pm2 start "npm run start" --name prorevv-frontend
            pm2 save
